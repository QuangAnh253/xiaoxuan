<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>给小玄的一个小彩蛋 🌸</title>
<meta property="og:title" content="给小玄的一个小彩蛋 🌸">
<meta property="og:description" content="一个小小的8月8日惊喜">
<meta property="og:image" content="https://QuangAnh253.github.io/xiaoxuan/preview.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://QuangAnh253.github.io/xiaoxuan/">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&family=Caveat:wght@500&display=swap" rel="stylesheet"/>

<style>
/* ═══════════════════════════════════════════
   VARIABLES — 颜色/字体 易修改区
═══════════════════════════════════════════ */
:root{
  --pink1:#fde0ed; --pink2:#f9c5d8; --pink3:#e891b4; --pink4:#d4609a;
  --purp0:#f3e8ff; --purp1:#e8d5f5; --purp2:#c9a8e8; --purp3:#a87ec8;
  --gold:#ffe8c0;
  --text0:#3a2040; --text1:#6a4070; --text2:#9a70aa;
  --glow-p:rgba(232,145,180,0.8); --glow-v:rgba(168,126,200,0.8);
  --font-zh:'Ma Shan Zheng',cursive;
  --font-sc:'Noto Serif SC',serif;
  --font-en:'Caveat',cursive;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  width:100%;min-height:100vh;overflow-x:hidden;
  background:#0d0410;
  font-family:var(--font-sc);
  -webkit-tap-highlight-color:transparent;
  touch-action:pan-y;
}

/* ─── CANVAS LAYERS ─── */
#petalCanvas,#glowCanvas{
  position:fixed;inset:0;z-index:1;pointer-events:none;
}
#glowCanvas{z-index:2}

/* ─── APP ─── */
#app{position:relative;z-index:3;min-height:100vh;
  display:flex;flex-direction:column;align-items:center}

/* ═══════════════════════════════════════════
   CINEMATIC OPENING OVERLAY
═══════════════════════════════════════════ */
#cinematicOverlay{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#2a0530 0%,#0d0410 100%);
  transition:opacity 1.6s ease;
}
#cinematicOverlay.out{opacity:0;pointer-events:none}

/* Opening flower */
#openFlower{
  position:relative;width:170px;height:170px;
  display:flex;align-items:center;justify-content:center;
}
.op{
  position:absolute;
  width:52px;height:26px;
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  transform-origin:50% 100%;
  opacity:0;
  animation:petalBloom 2.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.op:nth-child(1){background:linear-gradient(to top,#e891b4,#fde0ed);--pr:0deg;animation-delay:.15s}
.op:nth-child(2){background:linear-gradient(to top,#d4609a,#f9c5d8);--pr:45deg;animation-delay:.3s}
.op:nth-child(3){background:linear-gradient(to top,#c9a8e8,#e8d5f5);--pr:90deg;animation-delay:.45s}
.op:nth-child(4){background:linear-gradient(to top,#a87ec8,#c9a8e8);--pr:135deg;animation-delay:.6s}
.op:nth-child(5){background:linear-gradient(to top,#e891b4,#fde0ed);--pr:180deg;animation-delay:.75s}
.op:nth-child(6){background:linear-gradient(to top,#d4609a,#f9c5d8);--pr:225deg;animation-delay:.9s}
.op:nth-child(7){background:linear-gradient(to top,#c9a8e8,#e8d5f5);--pr:270deg;animation-delay:1.05s}
.op:nth-child(8){background:linear-gradient(to top,#a87ec8,#c9a8e8);--pr:315deg;animation-delay:1.2s}
@keyframes petalBloom{
  0%{opacity:0;transform:rotate(var(--pr,0deg)) translateY(-8px) scale(0.05)}
  60%{opacity:1}
  100%{opacity:1;transform:rotate(var(--pr,0deg)) translateY(-42px) scale(1)}
}
#oc{/* core */
  position:absolute;width:30px;height:30px;border-radius:50%;
  background:radial-gradient(circle,#fff7e6,#ffd6a8);
  box-shadow:0 0 18px #ffcc88,0 0 40px rgba(255,200,100,.4);
  opacity:0;animation:cIn .5s ease 2s forwards;
}
@keyframes cIn{to{opacity:1}}
#oGlow{
  position:absolute;width:170px;height:170px;border-radius:50%;
  border:1px solid rgba(232,145,180,.3);
  box-shadow:0 0 50px rgba(232,145,180,.25),inset 0 0 40px rgba(232,145,180,.08);
  opacity:0;animation:cIn .8s ease 1.6s forwards;
}
#oLight{
  position:absolute;width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,145,180,.12) 0%,transparent 70%);
  animation:oLP 2.2s ease-in-out 1s infinite alternate;
}
@keyframes oLP{0%{transform:scale(.75);opacity:.4}100%{transform:scale(1.5);opacity:1}}

/* ═══════════════════════════════════════════
   SCREEN 1 — INTRO
═══════════════════════════════════════════ */
#screen1{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2rem 1.5rem 3rem;text-align:center;gap:2rem;
  opacity:0;transition:opacity 1.2s ease;
  width:100%;
}
#screen1.on{opacity:1}

/* ─── CARD IMAGE ─── */
#cardImage{
  width:min(280px,80vw);
  height:min(280px,80vw);
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 30px rgba(232,145,180,.35),0 8px 32px rgba(0,0,0,.5);
  border:1px solid rgba(232,145,180,.25);
  opacity:0;
  animation:imgFadeIn 1.2s ease 0.3s forwards;
}
@keyframes imgFadeIn{
  0%{opacity:0;transform:scale(.94) translateY(10px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

/* ─── LATE MESSAGE ─── */
#lateMsg{
  font-family:var(--font-zh);
  font-size:clamp(.9rem,3.5vw,1.05rem);
  color:rgba(248,221,237,.78);
  line-height:1.95;
  max-width:min(340px,88vw);
  text-align:center;
  padding:.8rem 1.2rem;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(232,145,180,.15);
  border-radius:14px;
  backdrop-filter:blur(4px);
  opacity:0;
  animation:msgSlideIn 1s ease 0.5s forwards;
}
@keyframes msgSlideIn{
  0%{opacity:0;transform:translateY(12px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes btnIn{
  0%{opacity:0;transform:translateY(18px) scale(.88)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
#typing-box{
  line-height:2.4;font-size:clamp(1.2rem,5vw,1.6rem);
  font-family:var(--font-zh);color:#f8dded;
  text-shadow:0 0 18px rgba(232,145,180,.45);
  min-height:5.5em;white-space:pre-line;
}
#cursor{
  display:inline-block;width:2px;height:1.1em;
  background:var(--pink3);vertical-align:middle;
  animation:blink .85s step-end infinite;margin-left:2px;
  box-shadow:0 0 6px var(--pink3);
}
@keyframes blink{50%{opacity:0}}
#btnStart{
  display:none;
  align-self:center;
  padding:.95rem 3rem;border:none;border-radius:60px;
  background:linear-gradient(135deg,var(--pink3),var(--purp3));
  color:#fff;font-family:var(--font-zh);font-size:1.45rem;
  letter-spacing:.1em;cursor:pointer;
  box-shadow:0 0 32px rgba(232,145,180,.5),0 4px 20px rgba(0,0,0,.4);
  transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
  margin:0 auto;
}
#btnStart::after{
  content:'';position:absolute;top:0;left:-60%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shim 2.6s ease infinite;
}
@keyframes shim{0%{left:-60%}100%{left:160%}}
#btnStart:active{transform:scale(.94)}

/* ═══════════════════════════════════════════
   SCREEN 2 — MAIN
═══════════════════════════════════════════ */
#screen2{
  min-height:100vh;width:100%;
  display:none;flex-direction:column;
  align-items:center;
  padding:3.5rem 1.5rem 5rem;
  gap:4rem;text-align:center;
  background:linear-gradient(180deg,#140320 0%,#230a3a 30%,#1a0628 65%,#0f0218 100%);
}

/* ─── NAME SVG ─── */
#nameSVG{
  width:230px;height:88px;overflow:visible;
  filter:drop-shadow(0 0 14px var(--glow-v)) drop-shadow(0 0 30px rgba(168,126,200,.35));
}
.nt{/* stroke */
  font-family:var(--font-zh);font-size:3rem;
  fill:none;stroke:var(--purp2);stroke-width:1.2;
  stroke-dasharray:900;stroke-dashoffset:900;
  animation:drawN 3.2s ease forwards .6s;
}
.nf{/* fill */
  font-family:var(--font-zh);font-size:3rem;
  fill:var(--purp1);opacity:0;
  animation:fillN 1s ease forwards 3.9s;
}
@keyframes drawN{to{stroke-dashoffset:0}}
@keyframes fillN{to{opacity:1}}
#nameSVG.glow{animation:nGlow 3s ease-in-out 4.5s infinite}
@keyframes nGlow{
  0%,100%{filter:drop-shadow(0 0 12px var(--glow-v)) drop-shadow(0 0 24px rgba(168,126,200,.3))}
  50%{filter:drop-shadow(0 0 26px var(--glow-v)) drop-shadow(0 0 55px rgba(168,126,200,.6))}
}

/* ─── CENTER FLOWER ─── */
#flowerWrap{
  position:relative;width:190px;height:190px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.aura{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(232,145,180,.1),transparent 70%);
  animation:auraP 3.5s ease-in-out infinite;
}
.aura:nth-child(1){width:230px;height:230px}
.aura:nth-child(2){width:290px;height:290px;animation-delay:1.1s;opacity:.6}
.aura:nth-child(3){width:360px;height:360px;animation-delay:2.2s;opacity:.3}
@keyframes auraP{0%,100%{transform:scale(.88);opacity:.7}50%{transform:scale(1.12);opacity:1}}
.ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(232,145,180,.2);
  animation:ringP 3.5s ease-out infinite;
}
.ring:nth-child(4){width:115px;height:115px;animation-delay:0s}
.ring:nth-child(5){width:155px;height:155px;animation-delay:1.1s}
.ring:nth-child(6){width:195px;height:195px;animation-delay:2.2s}
@keyframes ringP{0%{opacity:1;transform:scale(.65)}100%{opacity:0;transform:scale(1.55)}}
#mainFlower{
  position:relative;z-index:2;font-size:5.8rem;line-height:1;
  animation:breathe 4s ease-in-out infinite;
  filter:drop-shadow(0 0 18px var(--glow-p)) drop-shadow(0 0 36px rgba(232,145,180,.3));
  user-select:none;
}
@keyframes breathe{
  0%,100%{transform:scale(1) rotate(-2.5deg)}
  50%{transform:scale(1.1) rotate(2.5deg)}
}
#mainFlower.tap{
  animation:fTap .55s cubic-bezier(.34,1.56,.64,1) forwards,
            breathe 4s ease-in-out .55s infinite;
}
@keyframes fTap{
  0%{transform:scale(1)}45%{transform:scale(1.45) rotate(6deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ─── ORBIT DOTS ─── */
.orb{
  position:absolute;width:5px;height:5px;border-radius:50%;
  animation:orbit var(--od,6s) linear infinite;
  opacity:.75;
}
@keyframes orbit{
  from{transform:rotate(var(--os,0deg)) translateX(var(--or,80px)) rotate(calc(-1*var(--os,0deg)))}
  to{transform:rotate(calc(var(--os,0deg) + 360deg)) translateX(var(--or,80px)) rotate(calc(-1*(var(--os,0deg) + 360deg)))}
}

/* ─── QUOTE ─── */
#quoteSection{max-width:380px;width:100%}
#quoteHint{
  font-family:var(--font-en);font-size:1rem;color:var(--text2);
  margin-bottom:1rem;opacity:0;transition:opacity 1s;
}
#quoteHint.on{opacity:1}
#mainQuote{
  font-family:var(--font-zh);font-size:clamp(1.6rem,6.5vw,2.3rem);
  background:linear-gradient(135deg,var(--purp2),var(--pink3),var(--purp3));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(168,126,200,.55));
  min-height:1.4em;line-height:1.6;
}
#subQuote{
  margin-top:1.2rem;font-family:var(--font-sc);font-size:.95rem;
  color:var(--text2);line-height:2;white-space:pre-line;min-height:2.5em;
}

/* ─── TAP HINT ─── */
#tapHint{
  font-family:var(--font-en);font-size:.95rem;color:var(--text2);opacity:.7;
  animation:tpH 2.5s ease-in-out infinite;
}
@keyframes tpH{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:.85;transform:translateY(-5px)}}

/* Keep interaction hint visible on compact phone screens */
@media (max-width: 430px), (max-height: 760px){
  #screen2{
    padding:2.4rem 1rem 4.8rem;
    gap:2.4rem;
  }
  #tapHint{
    position:fixed;
    left:50%;
    bottom:1rem;
    transform:translateX(-50%);
    z-index:360;
    background:rgba(18,4,28,.68);
    border:1px solid rgba(201,168,232,.24);
    border-radius:999px;
    padding:.4rem .9rem;
    backdrop-filter:blur(8px);
    pointer-events:none;
    white-space:nowrap;
  }
}

/* ─── DIVIDER ─── */
.dvd{
  display:flex;align-items:center;gap:.8rem;width:100%;max-width:300px;opacity:.35;
}
.dvd::before,.dvd::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,232,.5),transparent);
}
.dvd span{font-size:.85rem;color:var(--purp2)}

/* ─── ENDING ─── */
#ending{
  padding:2.5rem 1.5rem 1rem;font-family:var(--font-zh);
  font-size:1.25rem;color:var(--text2);line-height:2.6;
  border-top:1px solid rgba(201,168,232,.15);max-width:320px;width:100%;
  opacity:0;transform:translateY(32px);
  transition:opacity 1.3s ease,transform 1.3s ease;
}
#ending.on{
  opacity:1;transform:translateY(0);
  animation:eF 4.5s ease-in-out 1.5s infinite;
}
@keyframes eF{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
#smiley{
  display:inline-block;
  font-family:var(--font-en);font-size:1.9rem;color:var(--pink3);
  transition:all 1.1s cubic-bezier(.34,1.56,.64,1);
}
#smiley.heart{transform:scale(1.35);letter-spacing:3px}

/* ═══════════════════════════════════════════
   DYNAMIC ELEMENTS
═══════════════════════════════════════════ */
/* tap particles */
.ptcl{
  position:fixed;pointer-events:none;z-index:200;
  animation:ptcUp var(--pd,2s) ease-out forwards;
  font-size:var(--ps,1.4rem);user-select:none;will-change:transform,opacity;
}
@keyframes ptcUp{
  0%{transform:translateY(0) translateX(0) rotate(0deg) scale(1);opacity:1}
  65%{opacity:1}
  100%{transform:translateY(var(--py,-170px)) translateX(var(--px,0px)) rotate(var(--pr,28deg)) scale(.35);opacity:0}
}
/* trail */
.trail{
  position:fixed;pointer-events:none;z-index:198;border-radius:50%;
  background:radial-gradient(circle,var(--tc,#f9c5d8),transparent);
  animation:trFd var(--td,.8s) ease-out forwards;will-change:transform,opacity;
}
@keyframes trFd{0%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(.08)}}
/* sparkle dot */
.spk{
  position:fixed;pointer-events:none;z-index:199;border-radius:50%;
  width:var(--sw,5px);height:var(--sw,5px);background:var(--sc,#f9c5d8);
  box-shadow:0 0 4px var(--sc,#f9c5d8);
  animation:spkB .75s ease-out forwards;
}
@keyframes spkB{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--stx,20px),var(--sty,-20px)) scale(0)}}
/* star spark */
.star{
  position:fixed;pointer-events:none;z-index:199;
  font-size:var(--ss,1rem);line-height:1;color:var(--sc,#f9c5d8);
  text-shadow:0 0 8px var(--sc);
  animation:stPop .95s ease-out forwards;
}
@keyframes stPop{
  0%{opacity:1;transform:translate(0,0) scale(0) rotate(0)}
  50%{opacity:1;transform:translate(var(--stx),var(--sty)) scale(1.1) rotate(180deg)}
  100%{opacity:0;transform:translate(calc(var(--stx)*1.6),calc(var(--sty)*1.6)) scale(.2) rotate(380deg)}
}
/* burst word */
.bword{
  position:fixed;pointer-events:none;z-index:201;
  font-family:var(--font-zh);font-size:2rem;
  color:var(--purp1);text-shadow:0 0 16px var(--glow-v),0 0 32px rgba(168,126,200,.45);
  animation:bwFly var(--wd,2s) ease-out forwards;
}
@keyframes bwFly{
  0%{transform:translate(-50%,-50%) scale(.15);opacity:0}
  18%{opacity:1}70%{opacity:1}
  100%{transform:translate(calc(-50% + var(--wx,0px)),calc(-50% + var(--wy,-140px))) scale(1.05);opacity:0}
}
/* firework */
.fw{
  position:fixed;pointer-events:none;z-index:300;
  animation:fwFly var(--ff,1.5s) ease-out forwards;
}
@keyframes fwFly{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  55%{opacity:1}
  100%{transform:translate(calc(-50% + var(--fx,0px)),calc(-50% + var(--fy,-110px))) scale(1.15);opacity:0}
}

/* ═══════════════════════════════════════════
   SHIN-CHAN POPUP
═══════════════════════════════════════════ */
#shinPopup{
  display:none;position:fixed;
  bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:400;
  background:rgba(18,4,28,.9);backdrop-filter:blur(16px);
  border:1px solid rgba(201,168,232,.28);border-radius:24px;
  padding:1.3rem 2rem;text-align:center;
  box-shadow:0 8px 40px rgba(168,126,200,.25),0 0 60px rgba(232,145,180,.08);
  max-width:300px;width:90%;
  animation:shinIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes shinIn{
  0%{transform:translateX(-50%) translateY(40px) scale(.5);opacity:0}
  100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
}
.shin-i{display:block;width:90px;height:90px;object-fit:cover;border-radius:14px;margin:0 auto .45rem;
  box-shadow:0 0 18px rgba(232,145,180,.35),0 6px 20px rgba(0,0,0,.35);
  animation:shinD .5s ease-in-out infinite alternate;}
@keyframes shinD{0%{transform:rotate(-12deg) scale(1)}100%{transform:rotate(12deg) scale(1.12)}}
#shinPopup p{
  font-family:var(--font-zh);font-size:1.1rem;color:var(--pink1);
  line-height:1.9;text-shadow:0 0 10px rgba(232,145,180,.35);
}
#shinClose{
  margin-top:.9rem;padding:.45rem 1.4rem;
  border:1px solid rgba(201,168,232,.28);border-radius:20px;
  background:transparent;color:var(--text2);
  font-family:var(--font-sc);font-size:.85rem;cursor:pointer;
}

/* ─── MUSIC BTN ─── */
#musicBtn{
  position:fixed;top:1rem;right:1rem;z-index:500;
  width:46px;height:46px;border-radius:50%;
  border:1px solid rgba(201,168,232,.28);
  background:rgba(18,4,28,.72);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;cursor:pointer;
  box-shadow:0 2px 16px rgba(168,126,200,.18);
  transition:transform .2s;
}
#musicBtn:active{transform:scale(.88)}
#mNote{display:block;transition:transform .3s}
#musicBtn.play #mNote{animation:nW .6s ease-in-out infinite alternate}
@keyframes nW{0%{transform:rotate(-10deg) scale(1)}100%{transform:rotate(10deg) scale(1.15)}}
</style>
</head>
<body>

<!-- 起风了 SoundCloud (hidden iframe, controlled via SC Widget API) -->
<div id="scWrapper" style="position:fixed;left:-9999px;bottom:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;z-index:-1;">
  <iframe id="scFrame" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay; encrypted-media"
    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/953024785&color=%23e891b4&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
  </iframe>
</div>

<button id="musicBtn" aria-label="音乐"><span id="mNote">🎵</span></button>

<!-- ══════════════════════════════════════
     CINEMATIC OPENING
══════════════════════════════════════ -->
<div id="cinematicOverlay">
  <div id="openFlower">
    <div id="oLight"></div>
    <div id="oGlow"></div>
    <div class="op"></div><div class="op"></div><div class="op"></div><div class="op"></div>
    <div class="op"></div><div class="op"></div><div class="op"></div><div class="op"></div>
    <div id="oc"></div>
  </div>

/* ════ SCREEN 1 TYPING ELEMENTS — declared early ════ */

function scatterPetalsFromCenter(){

/* ════ CANVAS SETUP ════ */
const pc=$('petalCanvas'), gc=$('glowCanvas');
const pCtx=pc.getContext('2d'), gCtx=gc.getContext('2d');
function resizeCvs(){

resizeCvs();
window.addEventListener('resize',resizeCvs);

/* Petal shape (three-lobed) */
class Petal{
  constructor(lyr){this.lyr=lyr;this.reset(true)}
  reset(init=false){
    const W=pc.width,H=pc.height,lyr=this.lyr;
    this.x=rand(0,W);
    this.y=init?rand(0,H):-25;
    // Proper anime sakura sizes per layer
    this.sz=lyr===0?rand(3,6):lyr===1?rand(6,11):rand(10,17);
    // Gentle fall speed with natural sway
    this.vy=(rand(.3,.85))*(lyr===0?.35:lyr===1?.65:1.05);
    this.vx=rand(-.25,.25);
    this.spin=(rand(-.03,.03))*(lyr===0?.5:lyr===1?1:1.5); // gentle spin
    this.ang=rand(0,Math.PI*2);
    // Sway oscillation
    this.swayAmp=rand(.3,.9);
    this.swaySpd=rand(.008,.02);
    this.swayOff=rand(0,Math.PI*2);
    this.alpha=lyr===0?rand(.12,.28):lyr===1?rand(.22,.42):rand(.35,.65);
    // Sakura color palette: white-pink to rose
    const r=Math.random();
    const a=this.alpha;
    if(r<.35){
      this.col=`rgba(255,220,232,${a})`;   // pale blush
      this.col2=`rgba(255,190,210,${a*.8})`;
    } else if(r<.65){
      this.col=`rgba(248,185,210,${a})`;   // sakura pink
      this.col2=`rgba(235,150,185,${a*.8})`;
    } else if(r<.85){
      this.col=`rgba(245,200,225,${a})`;   // soft rose
      this.col2=`rgba(225,170,200,${a*.8})`;
    } else {
      this.col=`rgba(210,170,230,${a})`;   // lavender tint
      this.col2=`rgba(190,145,215,${a*.8})`;
    }
    this.gf=(lyr+1)*.32;
  }
  update(){
    this.y+=this.vy;
    // Natural pendulum sway + gyro
    const sway=Math.sin(this.y*this.swaySpd+this.swayOff)*this.swayAmp;
    this.x+=this.vx+sway+gyroX*this.gf;
    this.ang+=this.spin+Math.sin(this.y*this.swaySpd*.5)*.002;
    if(this.y>pc.height+26)this.reset();
    if(this.x<-26)this.x=pc.width+8;
    if(this.x>pc.width+26)this.x=-8;
  }
  draw(){
    pCtx.save();
    pCtx.translate(this.x,this.y);
    pCtx.rotate(this.ang);
    // Anime sakura petal: two rounded lobes with a notch at top
    const s=this.sz;
    pCtx.beginPath();
    // Left lobe
    pCtx.moveTo(0,0);
    pCtx.bezierCurveTo(-s*.7,s*.1,-s*.9,-s*.6,-s*.15,-s*1.0);
    // Notch at top
    pCtx.bezierCurveTo(-s*.05,-s*1.15,s*.05,-s*1.15,s*.15,-s*1.0);
    // Right lobe
    pCtx.bezierCurveTo(s*.9,-s*.6,s*.7,s*.1,0,0);
    pCtx.closePath();
    // Gradient fill — light pink edge, slightly deeper center
    const grad=pCtx.createLinearGradient(0,0,0,-s*1.1);
    grad.addColorStop(0,  this.col2);   // base
    grad.addColorStop(0.5,this.col);    // mid
    grad.addColorStop(1,  'rgba(255,240,248,'+this.alpha*.9+')'); // tip
    pCtx.fillStyle=grad;
    pCtx.fill();
    // Subtle vein line
    pCtx.beginPath();
    pCtx.moveTo(0,0);pCtx.lineTo(0,-s*1.0);
    pCtx.strokeStyle='rgba(255,200,220,'+this.alpha*.4+')';
    pCtx.lineWidth=0.5;
    pCtx.stroke();
    pCtx.restore();
  }
}

class GlowOrb{
  constructor(){this.reset(true)}
  reset(init=false){
    this.x=rand(0,gc.width);
    this.y=init?rand(0,gc.height):gc.height+55;
    this.r=rand(18,60);this.vy=rand(.12,.28);
    this.drift=rand(-.2,.2);
    this.alpha=rand(.025,.07);this.pink=Math.random()>.5;
  }
  update(){this.y-=this.vy;this.x+=this.drift;if(this.y<-65)this.reset()}
  draw(){
    const g=gCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,this.pink?`rgba(232,145,180,${this.alpha})`:`rgba(168,126,200,${this.alpha})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    gCtx.beginPath();gCtx.arc(this.x,this.y,this.r,0,Math.PI*2);
    gCtx.fillStyle=g;gCtx.fill();
  }
}

const petals=[
  ...Array.from({length:18},()=>new Petal(0)),  // far/small layer
  ...Array.from({length:22},()=>new Petal(1)),  // mid layer
  ...Array.from({length:14},()=>new Petal(2)),  // near/large layer
];
const orbs=Array.from({length:14},()=>new GlowOrb());

(function loop(){
  pCtx.clearRect(0,0,pc.width,pc.height);
  gCtx.clearRect(0,0,gc.width,gc.height);
  petals.forEach(p=>{p.update();p.draw()});
  orbs.forEach(o=>{o.update();o.draw()});
  requestAnimationFrame(loop);
})();

/* Gyroscope parallax */
window.addEventListener('deviceorientation',e=>{
  gyroX=(e.gamma||0)*.009;
},{passive:true});

/* ════ ORBIT DOTS around flower ════ */
(function addOrbitDots(){
  const wrap=$('flowerWrap');

/* ════ SCREEN 1 TYPING ════ */

async function typeLines(lines){
  for(let i=0;i<lines.length;i++){
    for(const ch of lines[i]){typedEl.textContent+=ch;await sleep(100)}
    if(i<lines.length-1){typedEl.textContent+='\n';await sleep(560)}
  }
  await sleep(480);
  curEl.style.display='none';
  btnS.style.display='inline-block';
  btnS.offsetWidth;
  btnS.style.animation='btnIn .6s cubic-bezier(.34,1.56,.64,1) both';
}

/* ════ TRANSITION S1 → S2 ════ */
btnS.addEventListener('click',()=>{
  startMusicFromGesture();
  const s1=$('screen1'),s2=$('screen2');
  s1.style.transition='opacity .7s';s1.style.opacity='0';

  const fl=document.createElement('div');
  fl.style.cssText='position:fixed;inset:0;z-index:490;pointer-events:none;'+
    'background:radial-gradient(circle at 50% 50%,rgba(232,145,180,.28),transparent 70%);'+
    'animation:trFd 1.3s ease-out forwards;';

  setTimeout(()=>{
    s1.style.display='none';

/* ════ BURST WORDS ════ */
function burstBlossom(){
  const cx=innerWidth/2,cy=innerHeight/2;
  C.burstWords.forEach((w,i)=>{
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='bword';
      const ang=(i/C.burstWords.length)*Math.PI*2-Math.PI/2;
      const dist=rand(105,185);
      el.style.setProperty('--wx',Math.cos(ang)*dist+'px');
      el.style.setProperty('--wy',Math.sin(ang)*dist-50+'px');
      el.style.setProperty('--wd',rand(1.5,2)+'s');
      el.style.left=cx+'px';el.style.top=cy+'px';
      el.textContent=w;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    },i*210);
  });

/* ════ QUOTE TYPING ════ */
async function startQuoteTyping(){
  await sleep(2500);
  const qh=$('quoteHint'),mq=$('mainQuote'),sq=$('subQuote');
  qh.classList.add('on');
  await sleep(900);
  for(const ch of C.mainQuote){mq.textContent+=ch;await sleep(115)}
  await sleep(850);
  for(let i=0,lines=C.subQuote.split('\n');i<lines.length;i++){
    for(const ch of lines[i]){sq.textContent+=ch;await sleep(72)}
    if(i<lines.length-1){sq.textContent+='\n';await sleep(290)}
  }
}

/* ════ ENDING OBSERVER ════ */
function setupEndingObs(){
  const el=$('ending'),sm=$('smiley');
  const ob=new IntersectionObserver(en=>{
    if(en[0].isIntersecting){
      el.classList.add('on');
      setTimeout(()=>{sm.textContent='❤️';sm.classList.add('heart')},2200);
      ob.disconnect();
    }
  },{threshold:.5});
  ob.observe(el);
}

/* ════ FLOWER TAP ════ */
const flEl=$('mainFlower');
$('flowerWrap').addEventListener('click',e=>{
  e.stopPropagation();
  fTaps++;
  flEl.classList.remove('tap');
  flEl.offsetWidth;
  flEl.classList.add('tap');
  const r=flEl.getBoundingClientRect();
  const fx=r.left+r.width/2, fy=r.top+r.height/2;
  spawnSpk(fx,fy,14);spawnStars(fx,fy,8);
  if(fTaps>=C.shinTrigger&&!shinDone){

    setTimeout(showShin,900);
  }
});

},{passive:true});

document.addEventListener('mouseup',()=>{ptrDown=false});

function spawnTrail(x,y){
  if(!s2Active)return;
  const now=Date.now();if(now-lastTrail<28)return;lastTrail=now;
  const cols=['rgba(249,197,216,.7)','rgba(201,168,232,.7)','rgba(255,232,192,.6)'];
  const sz=rand(7,18);
  const el=document.createElement('div');
  el.className='trail';
  el.style.cssText=`left:${x-sz/2}px;top:${y-sz/2}px;width:${sz}px;height:${sz}px;`;
  el.style.setProperty('--tc',cols[Math.floor(Math.random()*3)]);
  el.style.setProperty('--td',rand(.45,.75)+'s');
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

/* ════ TAP INTERACTION ════ */
document.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches) handleTap(t.clientX,t.clientY);
},{passive:true});
document.addEventListener('click',e=>{
  if(e.target.closest('#btnStart,#shinPopup,#musicBtn,#flowerWrap'))return;
  handleTap(e.clientX,e.clientY);
});

function handleTap(x,y){
  if(!s2Active)return;
  spawnPtcl(x,y);spawnSpk(x,y,6);spawnStars(x,y,3);
}

function spawnPtcl(x,y){
  const zh=Math.random()>.45;
  const pool=zh?C.tapZhWords:C.tapEmojis;
  const content=pool[Math.floor(Math.random()*pool.length)];
  const el=document.createElement('div');el.className='ptcl';
  el.textContent=content;
  el.style.left=(x-14)+'px';el.style.top=(y-14)+'px';
  el.style.setProperty('--pd',rand(1.5,2.4)+'s');
  el.style.setProperty('--ps',zh?'1.1rem':rand(1.1,1.9)+'rem');
  el.style.setProperty('--py',rand(-140,-200)+'px');
  el.style.setProperty('--px',rand(-50,50)+'px');
  el.style.setProperty('--pr',rand(-35,35)+'deg');
  if(zh){el.style.fontFamily='var(--font-zh)';el.style.color='var(--purp1)';
    el.style.textShadow='0 0 12px var(--glow-v)'}
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function spawnSpk(x,y,n=8){
  const cols=['#f9c5d8','#c9a8e8','#fde8f0','#e891b4','#ffe8c0','#fff'];
  for(let i=0;i<n;i++){
    const s=document.createElement('div');s.className='spk';
    s.style.left=x+'px';s.style.top=y+'px';
    const ang=(i/n)*Math.PI*2+rand(0,.6);
    const d=rand(18,55);
    s.style.setProperty('--stx',Math.cos(ang)*d+'px');
    s.style.setProperty('--sty',Math.sin(ang)*d+'px');
    s.style.setProperty('--sc',cols[Math.floor(Math.random()*cols.length)]);
    s.style.setProperty('--sw',rand(3,7)+'px');
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),850);
  }
}

function spawnStars(x,y,n=5){
  const sym=['✦','✧','✩','*','◦','·'];
  const cols=['#f9c5d8','#c9a8e8','#ffe8c0','#ffffff'];
  for(let i=0;i<n;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=x+'px';s.style.top=y+'px';
    const ang=(i/n)*Math.PI*2+rand(0,1);
    const d=rand(28,75);
    s.textContent=sym[Math.floor(Math.random()*sym.length)];
    s.style.setProperty('--stx',Math.cos(ang)*d+'px');
    s.style.setProperty('--sty',Math.sin(ang)*d+'px');
    s.style.setProperty('--sc',cols[Math.floor(Math.random()*cols.length)]);
    s.style.setProperty('--ss',rand(.65,1.1)+'rem');
    s.style.animationDelay=rand(0,.1)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1300);
  }
}

/* ════ FIREWORKS ════ */
function triggerFireworks(){
  const pool=['🌸','🌺','🌷','✨','💗','🎊','🎉'];
  for(let i=0;i<35;i++){

      const el=document.createElement('div');el.className='fw';

      el.style.left=cx+'px';el.style.top=cy+'px';

      el.style.setProperty('--fx',Math.cos(ang)*d+'px');
      el.style.setProperty('--fy',Math.sin(ang)*d+'px');
      el.style.setProperty('--ff',rand(.9,1.8)+'s');
      el.textContent=pool[Math.floor(Math.random()*pool.length)];
      el.style.fontSize=rand(.85,1.8)+'rem';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2600);
    },i*72);

/* ════ SHIN-CHAN ════ */
function showShin(){
  const p=$('shinPopup');p.style.display='block';
  setTimeout(()=>{if(p.style.display!=='none')closeShin(false)},7500);
}
$('shinClose').addEventListener('click',()=>closeShin(true));
function closeShin(scrollToEnd=false){
  const p=$('shinPopup');
  p.style.transition='opacity .5s,transform .5s';
  p.style.opacity='0';p.style.transform='translateX(-50%) translateY(18px) scale(.9)';
  setTimeout(()=>{
    p.style.display='none';
    p.style.opacity='1';
    p.style.transform='';
    if(scrollToEnd){
      window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
    }
  },550);
}
</script>
